<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <style>
      .doct-text { font-family: 'Inter', Arial, sans-serif; font-size: 48px; font-weight: 700; fill: #1e3a8a; }
      .agri-text { font-family: 'Inter', Arial, sans-serif; font-size: 48px; font-weight: 700; fill: #22c55e; }
    </style>
  </defs>
  
  <!-- Doct part (dark blue #1e3a8a) -->
  <text x="0" y="45" class="doct-text">D</text>
  
  <!-- Circular icon replacing 'o' in Doct -->
  <!-- Outer white circle with blue border -->
  <circle cx="50" cy="30" r="18" fill="white" stroke="#1e3a8a" stroke-width="2"/>
  <!-- Inner green circle with blue border -->
  <circle cx="50" cy="30" r="12" fill="#22c55e" stroke="#1e3a8a" stroke-width="1.5"/>
  <!-- Medical cross inside -->
  <line x1="50" y1="22" x2="50" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="30" x2="60" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  
  <text x="70" y="45" class="doct-text">ct</text>
  
  <!-- Agri part (vibrant green #22c55e) -->
  <text x="105" y="45" class="agri-text">Agr</text>
  
  <!-- Leaf replacing dot on 'i' - pointing upwards and slightly to the right -->
  <path d="M 160 12 Q 162 7 165 10 Q 168 7 170 12 Q 168 16 165 18 Q 162 16 160 12" fill="#22c55e"/>
  <!-- Stem of the 'i' -->
  <line x1="165" y1="18" x2="165" y2="35" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
</svg>
